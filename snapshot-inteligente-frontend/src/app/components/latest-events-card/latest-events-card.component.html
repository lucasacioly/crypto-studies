<div class="bg-white rounded-lg shadow-md p-6">
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-semibold text-gray-900">Últimos Eventos</h2>
    <button (click)="refresh()" class="px-3 py-1 text-sm bg-gray-100 rounded hover:bg-gray-200 transition">
      Refresh
    </button>
  </div>

  <div *ngIf="isLoading" class="text-center py-8">
    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto"></div>
    <p class="mt-2 text-gray-600">Loading events...</p>
  </div>

  <div *ngIf="error" class="p-4 bg-red-100 border border-red-400 text-red-700 rounded-md">
    {{ error }}
  </div>

  <div *ngIf="!isLoading && latestEvents" class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- Latest Blocks -->
    <div>
      <h3 class="text-sm font-medium text-gray-700 mb-2">Blocos Recentes</h3>
      <div class="space-y-2 max-h-64 overflow-y-auto">
        <div *ngFor="let block of latestEvents.blocks" class="p-2 bg-gray-50 rounded text-sm">
          <span class="font-mono text-blue-600">{{ truncate(block.hash) }}</span>
          <span class="text-gray-500 ml-2">{{ formatTimestamp(block.ts) }}</span>
        </div>
        <div *ngIf="latestEvents.blocks.length === 0" class="text-gray-500 text-sm">
          Nenhum bloco recebido ainda
        </div>
      </div>
    </div>

    <!-- Latest Transactions -->
    <div>
      <h3 class="text-sm font-medium text-gray-700 mb-2">Transações Recentes</h3>
      <div class="space-y-2 max-h-64 overflow-y-auto">
        <div *ngFor="let tx of latestEvents.txs" class="p-2 bg-gray-50 rounded text-sm">
          <span class="font-mono text-green-600">{{ truncate(tx.txid) }}</span>
          <span class="text-gray-500 ml-2">{{ formatTimestamp(tx.ts) }}</span>
        </div>
        <div *ngIf="latestEvents.txs.length === 0" class="text-gray-500 text-sm">
          Nenhuma transação recebida ainda
        </div>
      </div>
    </div>
  </div>
</div>
